<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างการมอบหมายงาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2E4531; 
            --light-green: #E8F5E9;
            --dark-gray: #333;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
            color: var(--dark-gray);
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header {
            background-color: var(--primary-green);
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-size: 24px;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 18px; font-weight: 500; margin-bottom: 8px; }
        input[type="text"], input[type="date"], input[type="time"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-family: 'Kanit', sans-serif;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .user-list {
            background: var(--light-green);
            padding: 15px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .user-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .user-item input[type="checkbox"] {
            transform: scale(1.5);
            margin-right: 15px;
        }
        .btn-submit {
            background-color: var(--primary-green);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 20px;
            font-family: 'Kanit', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover { background-color: #1a291d; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">ระบบสร้างงานและมอบหมายภารกิจ</div>

    <div class="form-group">
        <label>ชื่องาน / ภารกิจ</label>
        <input type="text" id="taskName" placeholder="พิมพ์ชื่องานที่นี่...">
    </div>

    <div class="form-group">
        <label>วันที่ปฏิบัติงาน</label>
        <input type="date" id="taskDate">
    </div>

    <div class="form-group">
        <label>เวลาที่ปฏิบัติงาน</label>
        <input type="time" id="taskTime">
    </div>

    <div class="form-group">
        <label>ผู้รับผิดชอบ (เลือกได้มากกว่า 1 คน)</label>
        <div class="user-list" id="userCheckboxes">
            <!-- รายชื่อจะถูกดึงมาแสดงตรงนี้อัตโนมัติ -->
            <div style="text-align: center;">กำลังโหลดรายชื่อ...</div>
        </div>
    </div>

    <button class="btn-submit" onclick="submitTask()" id="submitBtn">บันทึกและส่งแจ้งเตือน</button>
</div>

<script>
    const GAS_API_URL = 'YOUR_GAS_API_URL'; // **ใส่ URL ของ Google Apps Script ที่เพิ่งอัปเดตใหม่**

    // ดึงรายชื่อมาสร้าง Checkbox ทันทีที่เปิดหน้าเว็บ
    window.onload = async function() {
        try {
            const response = await fetch(GAS_API_URL);
            const result = await response.json();
            const users = result.users;
            
            const container = document.getElementById('userCheckboxes');
            container.innerHTML = '';
            
            users.forEach(user => {
                container.innerHTML += `
                    <div class="user-item">
                        <input type="checkbox" value="${user}" class="user-check">
                        <label style="margin:0; font-weight:normal;">${user}</label>
                    </div>
                `;
            });
        } catch (error) {
            document.getElementById('userCheckboxes').innerHTML = 'โหลดรายชื่อไม่สำเร็จ โปรดรีเฟรชหน้าเว็บ';
        }
    }

    // ฟังก์ชันส่งข้อมูล
    async function submitTask() {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const time = document.getElementById('taskTime').value;
        
        // รวบรวมรายชื่อคนที่ถูกติ๊กเลือก
        const checkboxes = document.querySelectorAll('.user-check:checked');
        let selectedUsers = [];
        checkboxes.forEach(box => selectedUsers.push(box.value));

        if (!name || !date || selectedUsers.length === 0) {
            alert("กรุณากรอกชื่องาน วันที่ และเลือกผู้รับผิดชอบอย่างน้อย 1 คน");
            return;
        }

        // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'กำลังบันทึก...';
        btn.disabled = true;

        // รูปแบบข้อมูล วันที่ แปลงจาก YYYY-MM-DD เป็น DD/MM/YYYY
        const dateParts = date.split('-');
        const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;

        const payload = {
            action: 'createTask',
            taskName: name,
            taskDate: formattedDate,
            taskTime: time,
            assignees: selectedUsers.join(', ') // แปลงเป็น String คั่นด้วยลูกน้ำ
        };

        try {
            await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            alert('สร้างงานและแจ้งเตือนเรียบร้อยแล้ว!');
            window.location.reload(); // รีเฟรชหน้าจอเคลียร์ฟอร์ม
        } catch (error) {
            alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
            btn.innerText = 'บันทึกและส่งแจ้งเตือน';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
